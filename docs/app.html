<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Pulse</title>
    <meta name="description" content="Beach Pulse - explore your university.">  <!-- SEO -->
    <title>Beach Pulse</title>
    <link rel="icon" type="image/png" href="assets/images/logos/beach_pulse.png">  <!-- Favicon -->
    <link rel="stylesheet" href="css/basic_styles.css">  <!-- CSS -->
    <link rel="stylesheet" href="css/app.css">  <!-- App CSS -->
    <link rel="stylesheet" href="css/navbar.css">  <!-- Navigation Bar CSS -->
    <link rel="stylesheet" href="css/event_modal.css">  <!-- Event Creation Modal CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>  <!-- Leaflet Map CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>  <!-- Leaflet Map JS -->
    <script defer type="module" src="js/app.js"></script>  <!-- App JS -->
</head>
<body class="app-body">
    <div class="app-container">
        <!-- Events Page -->
        <section id="events-page" class="app-page active">
            <!-- Events injected with JavaScript -->
            <div id="events-container"></div>
        </section>

        <!-- Map Page -->
        <section id="map-page" class="app-page">
            <!-- Leaflet map loads here -->
            <div id="map"></div>
        </section>
    </div>

    <!-- Settings Button -->

    </button>

    <!-- Settings Dropdown Menu -->
    <div class="settings-menu hidden" id="settings-menu">
        <button class="menu-item" id="go-to-profile">
            <svg width="64" height="64" fill="currentColor" viewBox="0 0 24 24" transform="" id="injected-svg" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a5 5 0 1 0 0 10 5 5 0 1 0 0-10M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1"></path></svg>
            My Profile
        </button>
        <button class="menu-item" id="toggle-theme">
            <span id="theme-icon"></span>
            Toggle Dark Mode
        </button>
        <button class="menu-item" id="toggle-ui">
            <svg width="64" height="64" fill="currentColor" viewBox="0 0 24 24" transform="" id="injected-svg" xmlns="http://www.w3.org/2000/svg"><path d="M20 6h-3V4c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2M9 4h6v2H9z"></path></svg>
            Toggle UI Mode

        <button class="menu-item" id="logout-button">
            <svg width="64" height="64" fill="currentColor" viewBox="0 0 24 24" transform="" id="injected-svg" xmlns="http://www.w3.org/2000/svg"><path d="M9 13h7v-2H9V7l-6 5 6 5z"></path><path d="M19 3h-7v2h7v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2"></path></svg>
            Logout
        </button>
    </div>

    <!-- Navigation Bar -->
    <nav class="navigation-bar">
        <!-- Events Button -->
        <button class="nav-button active" data-page="events-page">
            <svg width="64" height="64" fill="currentColor" viewBox="0 0 24 24" transform="" id="injected-svg" xmlns="http://www.w3.org/2000/svg"><path d="M21 18c0 .55-.45 1-1 1s-1-.45-1-1V5c0-1.1-.9-2-2-2H3c-1.1 0-2 .9-2 2v13c0 1.65 1.35 3 3 3h16c1.65 0 3-1.35 3-3V6h-2zM5 7h5v6H5zm10 10H5v-2h10zm0-4h-3v-2h3zm0-4h-3V7h3z"></path></svg>

        <!-- Create Event Button Injected by JS for organizers and admins only -->

        </button>
    </nav>
</body>
</html>
