<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Pulse</title>
    <meta name="description" content="Beach Pulse - explore your university.">  <!-- SEO -->
    <title>Beach Pulse</title>
    <link rel="icon" type="image/png" href="assets/images/logos/beach_pulse.png">  <!-- Favicon -->
    <link rel="stylesheet" href="css/basic_styles.css">  <!-- CSS -->
    <link rel="stylesheet" href="css/app.css">  <!-- App CSS -->
    <link rel="stylesheet" href="css/navbar.css">  <!-- Navigation Bar CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>  <!-- Leaflet Map CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>  <!-- Leaflet Map JS -->
    <script defer type="module" src="js/app.js"></script>  <!-- App JS -->
</head>
<body class="app-body">
    <div class="app-container">
        <!-- Events Page -->
        <section id="events-page" class="app-page active">
            <!-- Events injected with JavaScript -->
            <div id="events-container"></div>
        </section>

        <!-- Map Page -->
        <section id="map-page" class="app-page">
            <!-- Leaflet map loads here -->
            <div id="map"></div>
        </section>
    </div>

    <!-- Settings Button -->
    <button id="settings-button" class="settings-button">
        <img src="assets/images/icons/profile.png" alt="Settings" class="icon-sm">
    </button>

    <!-- Settings Dropdown Menu -->
    <div class="profile-menu hidden" id="profile-menu">
        <button class="menu-item" id="go-profile">My Profile</button>
        <button class="menu-item" id="toggle-theme">Toggle Dark Mode</button>
        <button class="menu-item" id="toggle-ui">Toggle UI Mode</button>
        <button class="menu-item" id="logout-button">Logout</button>
    </div>

    <!-- Navigation Bar -->
    <nav class="bottom-nav">
        <!-- Events Button -->
        <button class="nav-button active" data-page="events-page">
            <img src="assets/images/icons/feed.png" class="nav-icon" alt="Feed">
        </button>
        <!-- Create Event Button -->
        <button class="nav-button create-button" id="open-event-modal">
            <img src="assets/images/icons/create_event.png" class="nav-icon" alt="Create Event">
        </button>
        <!-- Map Button -->
        <button class="nav-button" data-page="map-page">
            <img src="assets/images/icons/map.png" class="nav-icon" alt="Map">
        </button>
    </nav>

    <!-- Event Creation Modal -->
    <div class="event-modal hidden" id="event-modal">
        <div class="event-sheet">
            <h2 class="event-header">Create an Event</h2>
            <div class="event-body">
                <form id="event-form">
                    <input id="event-title" placeholder="Event Title" required>
                    <textarea id="event-description" placeholder="Description" maxlength="500" required></textarea>

                    <!-- Event Type -->
                    <label>Event Type</label>
                    <select id="event-type" required>
                        <option value="" disabled selected>Select event type</option>
                        <option value="alert">Alert</option>
                        <option value="academic">Academic</option>
                        <option value="athletic">Athletic</option>
                        <option value="career">Career</option>
                        <option value="organization">Organization</option>
                        <option value="social">Social</option>
                    </select>

                    <label>Tags</label>
                    <!-- Tags injected by JS -->
                    <div id="event-tags" class="tag-container"></div>

                    <!-- Date -->
                    <label>Date</label>
                    <input type="date" id="event-date" required>

                    <!-- Time & Location -->
                    <label>Time</label>
                    <input type="time" id="event-time" required>
                    <input id="event-location" placeholder="Location" required>

                    <!-- Map pin -->
                    <label>Click map to place a pin</label>
                    <div id="event-map" class="event-map"></div>

                    <!-- Upload event image -->
                    <label>Event Image</label>
                    <input type="file" id="event-image" accept="image/*">

                    <!-- Error messages -->
                    <div class="error" id="event-error"></div>

                    <!-- Action buttons -->
                    <div class="event-actions">
                        <button type="submit" class="primary-button" id="submit-event-button">Create</button>
                        <button type="button" class="secondary-button" id="cancel-event-button">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
