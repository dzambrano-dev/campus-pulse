<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="css/basic_styles.css">
    <link rel="stylesheet" href="css/app-pages/profile.css">
    <script defer src="js/app-pages/profile.js"></script>
</head>
<body class="profile-body">
    <!-- Back button -->
    <button class="profile-back-button" onclick="window.location.href='app.html'">← Back to App</button>

    <!-- Main profile card -->
    <div class="profile-card">
        <!-- Header -->
        <div class="profile-header">
            <h1 class="profile-title">My Profile</h1>
            <p class="profile-note">Manage your public campus profile</p>
        </div>

        <!-- Avatar section -->
        <div class="avatar-section">
            <!-- Profile image -->
            <img id="pfpPreview" src="assets/images/default-avatar.png" alt="Profile Picture" class="profile-avatar">

            <!-- Upload controls -->
            <div class="upload-row">
                <label for="pfpUpload" class="secondary-button upload-label">Update Photo</label>
                <span id="fileNameLabel">No file chosen</span>
                <input type="file" id="pfpUpload" accept="image/*" hidden>
            </div>
        </div>

        <!-- Username -->
        <div class="profile-field">
            <label for="username">Public Username</label>
            <input type="text" id="username" maxlength="20" placeholder="@j_smith" autocomplete="off">
            <small id="usernameStatus" class="profile-note">Choose a unique username</small>
        </div>

        <!-- Info box -->
        <div class="profile-info">
            <p class="profile-note">Your school email stays private.</p>
            <p class="profile-note">Connected with CSULB Microsoft Account</p>
        </div>

        <!-- Save button -->
        <button onclick="saveProfile()" class="primary-button">Save Changes</button>
    </div>
</body>
</html>
