<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Optional page-specific styles -->
    <link rel="stylesheet" href="css/profile.css">
</head>

<body class="profile-body">

    <!-- Main profile card -->
    <div class="profile-card">

        <!-- Page title -->
        <h1 class="profile-title">My Profile</h1>

        <!-- Avatar section -->
        <div class="avatar-section">

            <!-- Current profile picture -->
            <img
                id="pfpPreview"
                src="assets/images/default-avatar.png"
                alt="Profile Picture"
                class="profile-avatar"
            >

            <!-- Upload image -->
            <input
                type="file"
                id="pfpUpload"
                accept="image/*"
            >
        </div>

        <!-- Username section -->
        <div class="profile-field">

            <label for="username">Public Username</label>

            <input
                type="text"
                id="username"
                placeholder="@j.smith"
                maxlength="20"
            >
        </div>

        <!-- Helper text -->
        <p class="profile-note">
            Your school email stays private.
        </p>

        <p class="profile-note">
            Connected with CSULB Microsoft Account
        </p>

        <!-- Save button -->
        <button onclick="saveProfile()" class="primary-button">
            Save Changes
        </button>

    </div>

    <!-- JS -->
    <script src="assets/js/profile.js"></script>

</body>
</html>
