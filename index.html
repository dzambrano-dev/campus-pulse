<!DOCTYPE html>
<!--suppress HtmlFormInputWithoutLabel -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Pulse</title>
    <link rel="icon" type="image/x-icon" href="">  <!-- Icon -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container active" id="login-card">
        <h2>Beach Pulse Login</h2>
        <img class="brand" src="assets/images/CSULB_brand.png" alt="CSULB brand">
        <form id="login-form">
            <input id="username" type="text" placeholder="Username or Email" autofocus>
            <input id="password" type="password" placeholder="Password">
            <button type="submit" id="login-button">Login</button>
            <button type="button" id="signup-button">Sign Up</button>
        </form>
        <div class="error" id="login-error"></div>
    </div>
    <div class="login-container" id="signup-card">
        <h2>Beach Pulse Signup</h2>
        <img class="brand" src="assets/images/CSULB_brand.png" alt="CSULB brand">
        <form id="signup-form">
            <input id="signup-username" type="text" placeholder="Username">
            <input id="signup-email" type="email" placeholder="Email">
            <input id="signup-password" type="password" placeholder="Password">
            <button type="submit">Create Account</button>
            <button type="button" id="back-button">Back</button>
        </form>
        <div class="error" id="signup-error"></div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
